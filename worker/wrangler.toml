name = "wecoded-marketplace-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "marketplace"
database_id = "e31c0476-df4e-45aa-960e-24410879aca8"
migrations_dir = "migrations"

[ai]
binding = "AI"

[[analytics_engine_datasets]]
binding = "APP_ANALYTICS"
dataset = "youcoded_app_events"

[env.test]
# Test environment inherits config but omits AI binding — vitest-pool-workers /
# miniflare in this toolchain version can't resolve the wrapped AI worker.
[[env.test.d1_databases]]
binding = "DB"
database_name = "marketplace"
database_id = "e31c0476-df4e-45aa-960e-24410879aca8"
migrations_dir = "migrations"

[env.test.vars]
GH_CLIENT_ID = "test"
GH_CLIENT_SECRET = "test"
ADMIN_USER_IDS = "github:admin"

# Production runtime config: GH_CLIENT_ID, GH_CLIENT_SECRET, and ADMIN_USER_IDS
# are injected as secrets by CI (see .github/workflows/worker-deploy.yml).
# Do NOT add them as [vars] here — a var with the same name as a secret wins
# on deploy and silently clobbers the secret, breaking OAuth in prod.

[observability]
enabled = true
