<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Windows">
  <!-- Windows 2000 / XP-era chunky four-color flag, slightly skewed for a vintage feel. -->
  <g transform="skewX(-8) translate(4 0)">
    <rect x="10" y="12" width="22" height="20" fill="#F25022"/>
    <rect x="34" y="12" width="22" height="20" fill="#7FBA00"/>
    <rect x="10" y="34" width="22" height="20" fill="#00A4EF"/>
    <rect x="34" y="34" width="22" height="20" fill="#FFB900"/>
  </g>
</svg>
