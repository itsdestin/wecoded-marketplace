name: Update Registry

on:
  push:
    branches: [main]
    paths:
      - 'themes/**'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Generate theme previews
        run: node scripts/generate-previews.js

      - name: Rebuild registry
        run: python3 scripts/build-registry.py

      - name: Commit updated previews and registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add themes/*/preview.png registry/theme-registry.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: regenerate previews and registry [skip ci]"
            git push
          fi
