name: Update Registry

on:
  push:
    branches: [main]
    paths:
      - 'themes/**'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Rebuild registry
        run: python3 scripts/build-registry.py

      - name: Commit updated registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/theme-registry.json
          if git diff --cached --quiet; then
            echo "No registry changes"
          else
            git commit -m "chore: rebuild theme registry [skip ci]"
            git push
          fi
