name: Deploy Marketplace Worker

on:
  push:
    branches: [master]
    paths:
      - "worker/**"
      - ".github/workflows/worker-deploy.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: worker } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: worker/package-lock.json }
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Apply migrations
        run: npx wrangler d1 migrations apply marketplace --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Push secrets
        run: |
          echo "${{ secrets.MARKETPLACE_GH_CLIENT_ID }}" | npx wrangler secret put GH_CLIENT_ID
          echo "${{ secrets.MARKETPLACE_GH_CLIENT_SECRET }}" | npx wrangler secret put GH_CLIENT_SECRET
          echo "${{ secrets.MARKETPLACE_ADMIN_USER_IDS }}" | npx wrangler secret put ADMIN_USER_IDS
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
