name: Deploy Marketplace Worker

on:
  push:
    branches: [master]
    paths:
      - "worker/**"
      - ".github/workflows/worker-deploy.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: worker } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: worker/package-lock.json }
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Apply migrations
        run: npx wrangler d1 migrations apply marketplace --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      # Deploy MUST run before Push secrets: `wrangler deploy` reconciles the
      # Worker's bindings to match wrangler.toml, removing any stale vars left
      # from earlier deploys. Pushing a secret with the same name as a stale
      # var errors with "Binding name already in use". Deploy first clears
      # the slate; then secrets stick cleanly.
      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Push secrets
        run: |
          echo "${{ secrets.MARKETPLACE_GH_CLIENT_ID }}" | npx wrangler secret put GH_CLIENT_ID
          echo "${{ secrets.MARKETPLACE_GH_CLIENT_SECRET }}" | npx wrangler secret put GH_CLIENT_SECRET
          echo "${{ secrets.MARKETPLACE_ADMIN_USER_IDS }}" | npx wrangler secret put ADMIN_USER_IDS
          # Analytics Engine SQL-API credentials used by admin /admin/analytics/*
          # routes. CF_ANALYTICS_TOKEN is a narrow Analytics-Engine-Read scoped
          # token distinct from the broader CF_API_TOKEN used for deploy above.
          echo "${{ secrets.CF_ACCOUNT_ID }}" | npx wrangler secret put CF_ACCOUNT_ID
          echo "${{ secrets.MARKETPLACE_CF_ANALYTICS_TOKEN }}" | npx wrangler secret put CF_ANALYTICS_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
