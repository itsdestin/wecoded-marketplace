name: Rebuild Stats
on:
  schedule:
    - cron: '0 0 * * *'  # daily at midnight
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild index and stats
        run: |
          # Concatenate all registry entries into index.json
          echo "[" > index.json
          first=true
          for f in registry/prompts/*.json registry/plugins/*.json; do
            [ -f "$f" ] || continue
            if [ "$first" = true ]; then first=false; else echo "," >> index.json; fi
            cat "$f" >> index.json
          done
          echo "]" >> index.json
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json stats.json
          git diff --cached --quiet || git commit -m "chore: rebuild index and stats"
          git push
