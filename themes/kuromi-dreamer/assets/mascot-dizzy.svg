<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Kuromi Dreamer · dizzy · X X eyes, zigzag mouth, drooped arms -->
  <!-- Devil tail drooping -->
  <path d="M19 15 Q20.5 16 20.5 17.5 Q20.5 18.5 19.2 18.6 L20 19.4 L18.8 19.2 L19.5 20 L18.3 19.5 Z" fill="currentColor" opacity="0.75"/>
  <!-- Body -->
  <path d="M9 4 L15 4 A4 4 0 0 1 19 8 L19 12 A4 4 0 0 1 15 16 L9 16 A4 4 0 0 1 5 12 L5 8 A4 4 0 0 1 9 4 Z"
        fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <!-- Drooped arms -->
  <rect x="1" y="10" width="3" height="4" rx="0.8" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6" transform="rotate(-12 2.5 12)"/>
  <rect x="20" y="10" width="3" height="4" rx="0.8" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6" transform="rotate(12 21.5 12)"/>
  <!-- Legs -->
  <rect x="7.2" y="17" width="3.5" height="4" rx="1.2" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <rect x="13.3" y="17" width="3.5" height="4" rx="1.2" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <!-- X X eyes, drawn as crossed strokes -->
  <g stroke="currentColor" stroke-width="1" stroke-linecap="round">
    <line x1="8" y1="8.5" x2="10.6" y2="11.5"/>
    <line x1="10.6" y1="8.5" x2="8" y2="11.5"/>
    <line x1="13.4" y1="8.5" x2="16" y2="11.5"/>
    <line x1="16" y1="8.5" x2="13.4" y2="11.5"/>
  </g>
  <!-- Zigzag wavy mouth -->
  <path d="M10.4 13.4 L11.2 12.8 L12 13.4 L12.8 12.8 L13.6 13.4" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Whiskers droopy -->
  <g stroke="currentColor" stroke-width="0.4" stroke-linecap="round">
    <line x1="5.5" y1="11" x2="7" y2="11.3"/>
    <line x1="5.5" y1="12" x2="7" y2="12.3"/>
    <line x1="17" y1="11.3" x2="18.5" y2="11"/>
    <line x1="17" y1="12.3" x2="18.5" y2="12"/>
  </g>
  <!-- Jester hat flopped -->
  <g transform="rotate(-20 12 3)">
    <path d="M7 4 L6.2 1.8 L9 3.5 Z" fill="currentColor"/>
    <path d="M17 4 L17.8 1.8 L15 3.5 Z" fill="currentColor"/>
  </g>
  <!-- Pink skull -->
  <circle cx="12" cy="5.8" r="0.9" fill="#FF4FB8"/>
  <circle cx="11.7" cy="5.6" r="0.22" fill="#1A0F28"/>
  <circle cx="12.3" cy="5.6" r="0.22" fill="#1A0F28"/>
  <rect x="11.7" y="6" width="0.6" height="0.4" fill="#1A0F28"/>
  <!-- Dizziness swirls above head -->
  <path d="M5 3 Q6 2 7 3 Q6 4 5 3" fill="none" stroke="#FF4FB8" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M18 3 Q19 2 20 3 Q19 4 18 3" fill="none" stroke="#FF4FB8" stroke-width="0.5" stroke-linecap="round"/>
</svg>
