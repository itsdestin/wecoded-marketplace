<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="70" height="70">
  <!-- Minimal Hello Kitty silhouette pattern tile -->
  <g fill="#FF69B4" opacity="0.6">
    <!-- Head -->
    <ellipse cx="50" cy="52" rx="28" ry="24"/>
    <!-- Left ear -->
    <polygon points="26,32 22,10 38,28"/>
    <!-- Right ear -->
    <polygon points="74,32 78,10 62,28"/>
    <!-- Bow -->
    <ellipse cx="76" cy="22" rx="10" ry="7" transform="rotate(-15 76 22)"/>
    <ellipse cx="86" cy="16" rx="8" ry="6" transform="rotate(15 86 16)"/>
    <circle cx="80" cy="20" r="3"/>
  </g>
  <g fill="#3B0A1F">
    <!-- Eyes -->
    <ellipse cx="40" cy="50" rx="3" ry="3.5"/>
    <ellipse cx="60" cy="50" rx="3" ry="3.5"/>
    <!-- Nose -->
    <ellipse cx="50" cy="56" rx="2.5" ry="2" fill="#FFB6C1"/>
    <!-- Whiskers -->
    <line x1="20" y1="52" x2="38" y2="54" stroke="#3B0A1F" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="58" x2="38" y2="58" stroke="#3B0A1F" stroke-width="1" opacity="0.5"/>
    <line x1="62" y1="54" x2="80" y2="52" stroke="#3B0A1F" stroke-width="1" opacity="0.5"/>
    <line x1="62" y1="58" x2="80" y2="58" stroke="#3B0A1F" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
