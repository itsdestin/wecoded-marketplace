<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Strawberry Kitty · dizzy · X X eyes, zigzag mouth, drooped arms -->
  <!-- Body -->
  <path d="M9 4 L15 4 A4 4 0 0 1 19 8 L19 12 A4 4 0 0 1 15 16 L9 16 A4 4 0 0 1 5 12 L5 8 A4 4 0 0 1 9 4 Z"
        fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <!-- Cat ear tips flopped -->
  <g transform="rotate(-10 12 3)">
    <path d="M6 4.3 L6.8 1.8 L9 4 Z" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
    <path d="M18 4.3 L17.2 1.8 L15 4 Z" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  </g>
  <!-- Drooped arms -->
  <rect x="1" y="10" width="3" height="4" rx="0.8" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6" transform="rotate(-12 2.5 12)"/>
  <rect x="20" y="10" width="3" height="4" rx="0.8" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6" transform="rotate(12 21.5 12)"/>
  <!-- Legs -->
  <rect x="7.2" y="17" width="3.5" height="4" rx="1.2" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <rect x="13.3" y="17" width="3.5" height="4" rx="1.2" fill="#FFFFFF" stroke="currentColor" stroke-width="0.6"/>
  <!-- X X eyes -->
  <g stroke="currentColor" stroke-width="1" stroke-linecap="round">
    <line x1="8" y1="8.8" x2="10.6" y2="11.4"/>
    <line x1="10.6" y1="8.8" x2="8" y2="11.4"/>
    <line x1="13.4" y1="8.8" x2="16" y2="11.4"/>
    <line x1="16" y1="8.8" x2="13.4" y2="11.4"/>
  </g>
  <!-- Yellow nose -->
  <ellipse cx="12" cy="12.1" rx="0.5" ry="0.35" fill="#F7C948"/>
  <!-- Zigzag wavy mouth -->
  <path d="M10.4 13.4 L11.2 12.8 L12 13.4 L12.8 12.8 L13.6 13.4" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Whiskers droopy -->
  <g stroke="currentColor" stroke-width="0.4" stroke-linecap="round">
    <line x1="5.5" y1="11" x2="7" y2="11.3"/>
    <line x1="5.5" y1="12" x2="7" y2="12.3"/>
    <line x1="17" y1="11.3" x2="18.5" y2="11"/>
    <line x1="17" y1="12.3" x2="18.5" y2="12"/>
  </g>
  <!-- Bow lopsided -->
  <g transform="rotate(-18 17 4)">
    <path d="M17.2 3.3 L16.2 2.5 L16.2 4 Z" fill="#E14560"/>
    <path d="M17.2 3.3 L18.2 2.5 L18.2 4 Z" fill="#E14560"/>
    <circle cx="17.2" cy="3.3" r="0.35" fill="#E14560"/>
  </g>
  <!-- Strawberry (still clinging on) -->
  <path d="M6.7 5.2 Q6 6 6.2 6.8 Q6.6 7.6 7.4 7.5 Q8 7.2 8.1 6.3 Q8 5.4 7.4 5.1 Z" fill="#E14560"/>
  <path d="M6.5 5.1 L7.6 4.9 L7.5 5.4 L6.9 5.5 Z" fill="#6DB56D"/>
  <!-- Dizziness swirls -->
  <path d="M5 3 Q6 2 7 3 Q6 4 5 3" fill="none" stroke="#E14560" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M18 3 Q19 2 20 3 Q19 4 18 3" fill="none" stroke="#E14560" stroke-width="0.5" stroke-linecap="round"/>
</svg>
