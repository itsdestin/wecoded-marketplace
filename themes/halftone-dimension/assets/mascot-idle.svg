<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
  <!-- Halftone Dimension mascot — idle (>< squinting eyes) -->
  <!-- Dimensional glitch line behind body -->
  <rect x="3" y="5.5" width="18" height="0.6" rx="0.3" fill="#00b8ff" opacity="0.3"/>
  <rect x="4" y="14" width="16" height="0.5" rx="0.25" fill="#e8234a" opacity="0.25"/>

  <!-- Body with eye cutouts -->
  <path
    fill-rule="evenodd"
    d="M9 4 L15 4 A4 4 0 0 1 19 8 L19 12 A4 4 0 0 1 15 16 L9 16 A4 4 0 0 1 5 12 L5 8 A4 4 0 0 1 9 4 Z M8.5 8 L10.5 10 L8.5 12 L9.5 12 L11.5 10 L9.5 8 Z M15.5 8 L13.5 10 L15.5 12 L14.5 12 L12.5 10 L14.5 8 Z"
  />

  <!-- Spider-Verse dimensional visor across eyes -->
  <rect x="5.8" y="7.2" width="12.4" height="2.8" rx="1.2" fill="#e8234a" opacity="0.55"/>
  <rect x="6.2" y="7.6" width="11.6" height="2" rx="0.9" fill="#08060e" opacity="0.45"/>

  <!-- Halftone dot texture on body -->
  <circle cx="7" cy="6" r="0.4" fill="#e8234a" opacity="0.25"/>
  <circle cx="9" cy="5.5" r="0.35" fill="#00b8ff" opacity="0.2"/>
  <circle cx="17" cy="6" r="0.4" fill="#e8234a" opacity="0.25"/>
  <circle cx="15" cy="14" r="0.35" fill="#00b8ff" opacity="0.2"/>
  <circle cx="8" cy="14.5" r="0.4" fill="#e8234a" opacity="0.2"/>
  <circle cx="16" cy="5.5" r="0.3" fill="#ffea00" opacity="0.15"/>
  <circle cx="10" cy="14" r="0.3" fill="#ffea00" opacity="0.15"/>

  <!-- Left arm -->
  <path d="M1.8 9 L3.2 9 A0.8 0.8 0 0 1 4 9.8 L4 12.2 A0.8 0.8 0 0 1 3.2 13 L1.8 13 A0.8 0.8 0 0 1 1 12.2 L1 9.8 A0.8 0.8 0 0 1 1.8 9 Z" />
  <!-- Right arm -->
  <path d="M20.8 9 L22.2 9 A0.8 0.8 0 0 1 23 9.8 L23 12.2 A0.8 0.8 0 0 1 22.2 13 L20.8 13 A0.8 0.8 0 0 1 20 12.2 L20 9.8 A0.8 0.8 0 0 1 20.8 9 Z" />

  <!-- Left leg -->
  <rect x="7.2" y="17" width="3.5" height="4" rx="1.2" />
  <!-- Right leg -->
  <rect x="13.3" y="17" width="3.5" height="4" rx="1.2" />

  <!-- Chromatic aberration ghost on right side -->
  <rect x="19.5" y="8" width="0.4" height="5" rx="0.2" fill="#e8234a" opacity="0.2"/>
  <rect x="4.2" y="9" width="0.4" height="4" rx="0.2" fill="#00b8ff" opacity="0.2"/>
</svg>
