<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
  <!-- Halftone Dimension mascot — inquisitive (wide round eyes with pupils) -->

  <!-- Dimensional glitch lines -->
  <rect x="3" y="5.5" width="18" height="0.5" rx="0.25" fill="#00b8ff" opacity="0.3"/>
  <rect x="4" y="14.2" width="16" height="0.5" rx="0.25" fill="#e8234a" opacity="0.25"/>

  <!-- Body with round eye cutouts -->
  <path
    fill-rule="evenodd"
    d="M9 4 L15 4 A4 4 0 0 1 19 8 L19 12 A4 4 0 0 1 15 16 L9 16 A4 4 0 0 1 5 12 L5 8 A4 4 0 0 1 9 4 Z M9.8 8.2 A2 2 0 1 0 9.8 12.2 A2 2 0 1 0 9.8 8.2 Z M14.2 8.2 A2 2 0 1 0 14.2 12.2 A2 2 0 1 0 14.2 8.2 Z"
  />

  <!-- Dimensional visor -->
  <rect x="5.8" y="7.5" width="12.4" height="2.8" rx="1.2" fill="#e8234a" opacity="0.45"/>
  <rect x="6.2" y="7.9" width="11.6" height="2" rx="0.9" fill="#08060e" opacity="0.4"/>

  <!-- Pupils — tinted with dimension magenta -->
  <circle cx="10.3" cy="10.2" r="0.7" fill="#e8234a" opacity="0.9"/>
  <circle cx="10.3" cy="10.2" r="0.35" />
  <circle cx="14.7" cy="10.2" r="0.7" fill="#e8234a" opacity="0.9"/>
  <circle cx="14.7" cy="10.2" r="0.35" />

  <!-- Pupil highlight sparkles (chromatic) -->
  <circle cx="10.7" cy="9.8" r="0.2" fill="#00b8ff" opacity="0.6"/>
  <circle cx="15.1" cy="9.8" r="0.2" fill="#00b8ff" opacity="0.6"/>

  <!-- Halftone dots on body -->
  <circle cx="7" cy="6" r="0.4" fill="#e8234a" opacity="0.25"/>
  <circle cx="9" cy="5.3" r="0.35" fill="#00b8ff" opacity="0.2"/>
  <circle cx="17" cy="6" r="0.4" fill="#e8234a" opacity="0.25"/>
  <circle cx="15" cy="14.2" r="0.35" fill="#00b8ff" opacity="0.2"/>
  <circle cx="8" cy="14.5" r="0.4" fill="#e8234a" opacity="0.2"/>
  <circle cx="16" cy="5.5" r="0.3" fill="#ffea00" opacity="0.15"/>

  <!-- Left arm -->
  <path d="M1.8 9 L3.2 9 A0.8 0.8 0 0 1 4 9.8 L4 12.2 A0.8 0.8 0 0 1 3.2 13 L1.8 13 A0.8 0.8 0 0 1 1 12.2 L1 9.8 A0.8 0.8 0 0 1 1.8 9 Z" />
  <!-- Right arm -->
  <path d="M20.8 9 L22.2 9 A0.8 0.8 0 0 1 23 9.8 L23 12.2 A0.8 0.8 0 0 1 22.2 13 L20.8 13 A0.8 0.8 0 0 1 20 12.2 L20 9.8 A0.8 0.8 0 0 1 20.8 9 Z" />

  <!-- Left leg -->
  <rect x="7.2" y="17" width="3.5" height="4" rx="1.2" />
  <!-- Right leg -->
  <rect x="13.3" y="17" width="3.5" height="4" rx="1.2" />

  <!-- Chromatic aberration edges -->
  <rect x="19.5" y="7.8" width="0.4" height="5" rx="0.2" fill="#e8234a" opacity="0.2"/>
  <rect x="4.2" y="8.5" width="0.4" height="4" rx="0.2" fill="#00b8ff" opacity="0.2"/>
</svg>
