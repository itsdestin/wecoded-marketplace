<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
  <!-- Halftone Dimension mascot — welcome (sparkle eyes, waving) -->
  <defs>
    <radialGradient id="eye-swirl-a" cx="25%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#2a3040" stop-opacity="1" />
      <stop offset="100%" stop-color="#2a3040" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="eye-swirl-b" cx="70%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#2a2535" stop-opacity="1" />
      <stop offset="100%" stop-color="#2a2535" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Dimensional glitch lines -->
  <rect x="3" y="5" width="18" height="0.5" rx="0.25" fill="#00b8ff" opacity="0.3"/>
  <rect x="4" y="14.5" width="16" height="0.5" rx="0.25" fill="#e8234a" opacity="0.25"/>

  <!-- Eye backgrounds -->
  <ellipse cx="9.3" cy="9.55" rx="1.6" ry="2.2" fill="#1e2636" />
  <ellipse cx="9.3" cy="9.55" rx="1.6" ry="2.2" fill="url(#eye-swirl-a)" />
  <ellipse cx="9.3" cy="9.55" rx="1.6" ry="2.2" fill="url(#eye-swirl-b)" />
  <ellipse cx="14.7" cy="9.25" rx="1.6" ry="2.2" fill="#1e2636" />
  <ellipse cx="14.7" cy="9.25" rx="1.6" ry="2.2" fill="url(#eye-swirl-a)" />
  <ellipse cx="14.7" cy="9.25" rx="1.6" ry="2.2" fill="url(#eye-swirl-b)" />

  <!-- Body with eye cutouts -->
  <path
    fill-rule="evenodd"
    d="M9 4 L15 4 A4 4 0 0 1 19 8 L19 12 A4 4 0 0 1 15 16 L9 16 A4 4 0 0 1 5 12 L5 8 A4 4 0 0 1 9 4 Z M9.3 7.35 A1.6 2.2 0 1 0 9.3 11.75 A1.6 2.2 0 1 0 9.3 7.35 Z M14.7 7.05 A1.6 2.2 0 1 0 14.7 11.45 A1.6 2.2 0 1 0 14.7 7.05 Z"
  />

  <!-- Dimensional visor overlay -->
  <rect x="5.8" y="7.5" width="12.4" height="2.5" rx="1" fill="#e8234a" opacity="0.4"/>
  <rect x="6.2" y="7.8" width="11.6" height="1.8" rx="0.8" fill="#08060e" opacity="0.35"/>

  <!-- Eye sparkles (tinted with dimension colors) -->
  <circle cx="10" cy="10.25" r="0.3" fill="#e8234a" opacity="0.8"/>
  <circle cx="9.4" cy="10.85" r="0.2" fill="#00b8ff" opacity="0.7"/>
  <circle cx="10.3" cy="10.85" r="0.15" fill="#ffea00" opacity="0.6"/>
  <circle cx="15.4" cy="9.95" r="0.3" fill="#e8234a" opacity="0.8"/>
  <circle cx="14.8" cy="10.55" r="0.2" fill="#00b8ff" opacity="0.7"/>
  <circle cx="15.7" cy="10.55" r="0.15" fill="#ffea00" opacity="0.6"/>

  <!-- Tilted smile -->
  <g transform="rotate(-2 12 13.3)"><path d="M10.8 13.3 Q10.8 13 12 13 Q13.2 13 13.2 13.3 A1.1 1 0 0 1 10.8 13.3 Z" fill="#222030" /></g>

  <!-- Halftone dots on body -->
  <circle cx="7" cy="6" r="0.35" fill="#e8234a" opacity="0.25"/>
  <circle cx="17" cy="5.8" r="0.35" fill="#00b8ff" opacity="0.2"/>
  <circle cx="8" cy="14.5" r="0.35" fill="#e8234a" opacity="0.2"/>
  <circle cx="16" cy="14" r="0.3" fill="#ffea00" opacity="0.15"/>

  <!-- Left arm (lowered) -->
  <g transform="translate(0.3 1.0) rotate(-10 2.5 11)"><path d="M1.8 9 L3.2 9 A0.8 0.8 0 0 1 4 9.8 L4 12.2 A0.8 0.8 0 0 1 3.2 13 L1.8 13 A0.8 0.8 0 0 1 1 12.2 L1 9.8 A0.8 0.8 0 0 1 1.8 9 Z" /></g>
  <!-- Right arm (waving) -->
  <g transform="translate(-0.1 0.8) rotate(-20 19.5 6)"><path d="M20.8 2.5 L22.2 2.5 A0.8 0.8 0 0 1 23 3.3 L23 5.7 A0.8 0.8 0 0 1 22.2 6.5 L20.8 6.5 A0.8 0.8 0 0 1 20 5.7 L20 3.3 A0.8 0.8 0 0 1 20.8 2.5 Z" /></g>

  <!-- Legs -->
  <rect x="7.2" y="17" width="3.5" height="4" rx="1.2" />
  <rect x="13.3" y="17" width="3.5" height="4" rx="1.2" />

  <!-- Chromatic aberration edges -->
  <rect x="19.3" y="7.5" width="0.4" height="5" rx="0.2" fill="#e8234a" opacity="0.2"/>
  <rect x="4.4" y="8" width="0.4" height="4.5" rx="0.2" fill="#00b8ff" opacity="0.2"/>
</svg>
